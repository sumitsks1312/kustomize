apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - namespace.yaml

namespace: production
namePrefix: staging-

images:
  - name: nginx
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: my-sample-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2