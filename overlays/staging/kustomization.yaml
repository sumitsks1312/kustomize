apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - namespace.yaml

namespace: staging
namePrefix: staging-

images:
  - name: nginx
    newTag: "1.21.0"

patches:
  - target:
      kind: Deployment
      name: my-sample-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2